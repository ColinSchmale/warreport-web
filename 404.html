<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>War Report</title>
  <script>
    (function () {
      var appRoutes = ['/wars', '/clans', '/players', '/more'];
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      var isAppRoute = appRoutes.some(function (route) {
        return path === route || path.startsWith(route + '/');
      });
      if (isAppRoute) {
        window.location.replace('/?route=' + encodeURIComponent(path + search + hash));
      } else {
        window.location.replace('/');
      }
    })();
  </script>
</head>
<body>
</body>
</html>
