<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>War Report</title>
  <script>
    (function () {
      var path = window.location.pathname;
      var search = window.location.search;
      if (path.startsWith('/clans/') || path.startsWith('/players/')) {
        window.location.replace('/#' + path + search);
      } else {
        window.location.replace('/');
      }
    })();
  </script>
</head>
