<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>War Report</title>
  <script>
    (function () {
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      if (path.startsWith('/clans/') || path.startsWith('/players/') || path.startsWith('/wars/') || path.startsWith('/more/')) {
        window.location.replace('/?route=' + encodeURIComponent(path + search + hash));
      } else {
        window.location.replace('/');
      }
    })();
  </script>
</head>
<body>
</body>
</html>
